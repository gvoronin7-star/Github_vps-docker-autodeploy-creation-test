name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  # Джоба 1: Сборка и публикация Docker образа в GitHub Container Registry
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Джоба 2: Деплой на удалённый сервер через SSH
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to remote server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            # Получить тег образа
            LATEST_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

            # Pull нового образа
            echo "=== Pulling latest image ==="
            docker pull $LATEST_TAG

            # Остановить и удалить старый контейнер
            echo "=== Stopping old container ==="
            docker stop fastapi-time-server 2>/dev/null || true
            docker rm fastapi-time-server 2>/dev/null || true

            # Запустить новый контейнер на порту 8001
            echo "=== Starting new container ==="
            docker run -d \
              --name fastapi-time-server \
              --restart unless-stopped \
              -p 8001:8000 \
              -e ENVIRONMENT=production \
              $LATEST_TAG

            # Ожидание запуска приложения (20 секунд)
            echo "=== Waiting 20 seconds for app to start ==="
            sleep 20

            # Проверка статуса контейнера
            echo "=== Container status ==="
            docker ps | grep fastapi-time-server
            if [ $? -ne 0 ]; then
              echo "ERROR: Container failed to start!"
              docker ps -a | grep fastapi-time-server
              docker logs --tail 50 fastapi-time-server
              exit 1
            fi

            # Очистка старых образов (БЕЗОПАСНАЯ - не удалять используемые)
            echo "=== Cleaning old unused images ==="
            docker image prune -f --filter "until=24h" || true

            echo "=== Deployment step complete ==="
            docker ps | grep fastapi-time-server

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            # Проверка что контейнер запущен
            echo "=== Container status ==="
            docker ps | grep fastapi-time-server
            if [ $? -ne 0 ]; then
              echo "ERROR: Container is not running!"
              docker ps -a | grep fastapi-time-server
              docker logs --tail 50 fastapi-time-server
              exit 1
            fi

            # Дополнительная задержка перед проверкой
            echo "Waiting 5 seconds..."
            sleep 5

            # Проверка здоровья приложения на порту 8001
            echo "=== Health check ==="
            curl -f http://localhost:8001/time
            if [ $? -ne 0 ]; then
              echo "ERROR: Time endpoint failed!"
              docker logs --tail 50 fastapi-time-server
              exit 1
            fi

            curl -f http://localhost:8001/date
            if [ $? -ne 0 ]; then
              echo "ERROR: Date endpoint failed!"
              docker logs --tail 50 fastapi-time-server
              exit 1
            fi

            echo "✅ Deployment successful!"
            echo "=== Container logs (last 20 lines) ==="
            docker logs --tail 20 fastapi-time-server
